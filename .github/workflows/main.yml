      - name: Maintain Connection for 24 Hours
        run: |
          $durationHours = 24
          $endTime = (Get-Date).AddHours($durationHours)

          Write-Host "`n=== RDP ACCESS ==="
          Write-Host "Address: $env:TAILSCALE_IP"
          Write-Host "Username: RDP"
          Write-Host "Password: $(echo $env:RDP_CREDS)"
          Write-Host "==================`n"

          while ((Get-Date) -lt $endTime) {
              Write-Host "[$(Get-Date)] RDP Active - Remaining time: $([math]::Round(($endTime - (Get-Date)).TotalMinutes)) minutes"
              Start-Sleep -Seconds 300
          }

          Write-Host "24 hours elapsed. RDP workflow finished."
